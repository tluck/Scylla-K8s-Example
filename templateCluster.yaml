apiVersion: scylla.scylladb.com/v1
kind: ScyllaCluster
metadata:
  name: CLUSTERNAME
spec:
  agentVersion: AGENTVERSION # 3.10.1
  repository: docker.io/scylladb/scylla
  version: DBVERSION # 2026.1.4
  developerMode: DEVMODE
  scyllaArgs: "--smp=CPULIMIT" # "--poll-mode"
  #ALT alternator:
  #ALT   port: 8000
  #ALT   writeIsolation: WRITEISOLATION
  #BAK backups:
  #BAK   - name: daily
  #BAK     location: [s3:S3BUCKETNAME]
  #BAK     cron: "0 1 * * *" # Every day at 01:00
  #BAK     retention: 14     # Keep 14 days of backups
  #GCS backups:
  #GCS   - name: daily
  #GCS     location: [gcs:GCSBUCKETNAME]
  #GCS     cron: "0 1 * * *" # Every day at 01:00
  #GCS     retention: 14     # Keep 14 days of backups
  repairs:
    - name: weekly
      cron: "0 0 * * 0" # Every Sunday at midnight
      dc: ["DATACENTER"] # Specify the datacenter to run the repair in
      keyspace: ["*"]  # All keyspaces
      # intensity: 0 
      # parallel:  0 # Running parallel tasks – regular and tablet repair tasks can only run in parallel when regular task uses  --parallel 0  (otherwise the second task fails to start and gets rescheduled)
  exposeOptions:
    broadcastOptions:
      clients:
        type: BROADCASTCLIENTSTYPE
      nodes:
        type: BROADCASTNODESTYPE
    nodeService:
      type: NODESERVICETYPE
  #DEV sysctls: # deprecated
  #DEV   - fs.aio-max-nr=30000000
  #DEV   - fs.nr_open=1073741816
  #DEV   - fs.file-max=9223372036854775807
  #MDC externalSeeds:
  #MDC   - EXTERNAL-SEED-1
  #MDC   - EXTERNAL-SEED-2
  #MDC   - EXTERNAL-SEED-3
  datacenter:
    name: DATACENTER
    racks:
      - name: rack1
        members: 1
        storage:
          capacity: CAPACITY
          storageClassName: scylladb-local-xfs
        resources:
          requests:
            cpu: CPULIMIT
            memory: MEMORYLIMIT
          limits:
            cpu: CPULIMIT
            memory: MEMORYLIMIT
        agentResources:      # For ScyllaDB Agent container
          requests:
            cpu: "100m"
            memory: "100Mi"
          limits:
            cpu: "100m"
            memory: "100Mi"
        placement:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: scylla.scylladb.com/node-type
                      operator: In
                      values:
                        - NODESELECTOR
                    #CLOUD - key: topology.kubernetes.io/zone
                    #CLOUD   operator: In
                    #CLOUD   values:
                    #CLOUD   - ZONE1
          #PROD podAntiAffinity: 
          #PROD   preferredDuringSchedulingIgnoredDuringExecution:
          #PROD     - weight: 100
          #PROD       podAffinityTerm:
          #PROD         labelSelector:
          #PROD           matchLabels:
          #PROD             app: scylla
          #PROD         matchLabelKeys:
          #PROD           - scylla/datacenter
          #PROD         topologyKey: kubernetes.io/hostname
          tolerations:
            - effect: NoSchedule
              key: scylla-operator.scylladb.com/dedicated
              operator: Equal
              value: scyllaclusters
        #CTorG volumes:
        #CUSTC   - name: CLUSTERNAME-server-certs
        #CUSTC     secret:
        #CUSTC       secretName: CLUSTERNAME-server-certs
        #CUSTC       defaultMode: 420
        #CERTS   - name: scylladb-serving-ca
        #CERTS     configMap:
        #CERTS       name: CLUSTERNAME-local-serving-ca
        #CERTS       defaultMode: 420
        #GCS   - name: gcs-service-account
        #GCS     secret:
        #GCS       secretName: gcs-service-account
        #CTorG volumeMounts:
        #CUSTC   - name: CLUSTERNAME-server-certs
        #CUSTC     readOnly: true
        #CUSTC     mountPath: /var/run/secrets/scylla-server-certs/
        #CERTS   - name: scylladb-serving-ca
        #CERTS     readOnly: true
        #CERTS     mountPath: /var/run/configmaps/scylla-operator.scylladb.com/scylladb/serving-ca
        #GCS agentVolumeMounts:
        #GCS   - name: gcs-service-account
        #GCS     mountPath: /etc/scylla-manager-agent/gcs-service-account.json
        #GCS     subPath: gcs-service-account.json
        #GCS     readOnly: true
        #GCS     readOnly: true
      - name: rack2
        members: 1
        storage:
          capacity: CAPACITY
          storageClassName: scylladb-local-xfs
        resources:
          requests:
            cpu: CPULIMIT
            memory: MEMORYLIMIT
          limits:
            cpu: CPULIMIT
            memory: MEMORYLIMIT
        agentResources:      # For ScyllaDB Agent container
          requests:
            cpu: "100m"
            memory: "100Mi"
          limits:
            cpu: "100m"
            memory: "100Mi"
        placement:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: scylla.scylladb.com/node-type
                      operator: In
                      values:
                        - NODESELECTOR
                    #CLOUD - key: topology.kubernetes.io/zone
                    #CLOUD   operator: In
                    #CLOUD   values:
                    #CLOUD   - ZONE2
          #PROD podAntiAffinity: 
          #PROD   preferredDuringSchedulingIgnoredDuringExecution:
          #PROD     - weight: 100
          #PROD       podAffinityTerm:
          #PROD         labelSelector:
          #PROD           matchLabels:
          #PROD             app: scylla
          #PROD         matchLabelKeys:
          #PROD           - scylla/datacenter
          #PROD         topologyKey: kubernetes.io/hostname
          tolerations:
            - effect: NoSchedule
              key: scylla-operator.scylladb.com/dedicated
              operator: Equal
              value: scyllaclusters
        #CTorG volumes:
        #CUSTC   - name: CLUSTERNAME-server-certs
        #CUSTC     secret:
        #CUSTC       secretName: CLUSTERNAME-server-certs
        #CUSTC       defaultMode: 420
        #CERTS   - name: scylladb-serving-ca
        #CERTS     configMap:
        #CERTS       name: CLUSTERNAME-local-serving-ca
        #CERTS       defaultMode: 420
        #GCS   - name: gcs-service-account
        #GCS     secret:
        #GCS       secretName: gcs-service-account
        #CTorG volumeMounts:
        #CUSTC   - name: CLUSTERNAME-server-certs
        #CUSTC     readOnly: true
        #CUSTC     mountPath: /var/run/secrets/scylla-server-certs/
        #CERTS   - name: scylladb-serving-ca
        #CERTS     readOnly: true
        #CERTS     mountPath: /var/run/configmaps/scylla-operator.scylladb.com/scylladb/serving-ca
        #GCS agentVolumeMounts:
        #GCS   - name: gcs-service-account
        #GCS     mountPath: /etc/scylla-manager-agent/gcs-service-account.json
        #GCS     subPath: gcs-service-account.json
        #GCS     readOnly: true

      - name: rack3
        members: 1
        storage:
          capacity: CAPACITY
          storageClassName: scylladb-local-xfs
        resources:
          requests:
            cpu: CPULIMIT
            memory: MEMORYLIMIT
          limits:
            cpu: CPULIMIT
            memory: MEMORYLIMIT
        agentResources:      # For ScyllaDB Agent container
          requests:
            cpu: "100m"
            memory: "100Mi"
          limits:
            cpu: "100m"
            memory: "100Mi"
        placement:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: scylla.scylladb.com/node-type
                      operator: In
                      values:
                        - NODESELECTOR
                    #CLOUD - key: topology.kubernetes.io/zone
                    #CLOUD   operator: In
                    #CLOUD   values:
                    #CLOUD   - ZONE3
          #PROD podAntiAffinity: 
          #PROD   preferredDuringSchedulingIgnoredDuringExecution:
          #PROD     - weight: 100
          #PROD       podAffinityTerm:
          #PROD         labelSelector:
          #PROD           matchLabels:
          #PROD             app: scylla
          #PROD         matchLabelKeys:
          #PROD           - scylla/datacenter
          #PROD         topologyKey: kubernetes.io/hostname
          tolerations:
            - effect: NoSchedule
              key: scylla-operator.scylladb.com/dedicated
              operator: Equal
              value: scyllaclusters
        #CTorG volumes:
        #CUSTC   - name: CLUSTERNAME-server-certs
        #CUSTC     secret:
        #CUSTC       secretName: CLUSTERNAME-server-certs
        #CUSTC       defaultMode: 420
        #CERTS   - name: scylladb-serving-ca
        #CERTS     configMap:
        #CERTS       name: CLUSTERNAME-local-serving-ca
        #CERTS       defaultMode: 420
        #GCS   - name: gcs-service-account
        #GCS     secret:
        #GCS       secretName: gcs-service-account
        #CTorG volumeMounts:
        #CUSTC   - name: CLUSTERNAME-server-certs
        #CUSTC     readOnly: true
        #CUSTC     mountPath: /var/run/secrets/scylla-server-certs/
        #CERTS   - name: scylladb-serving-ca
        #CERTS     readOnly: true
        #CERTS     mountPath: /var/run/configmaps/scylla-operator.scylladb.com/scylladb/serving-ca
        #GCS agentVolumeMounts:
        #GCS   - name: gcs-service-account
        #GCS     mountPath: /etc/scylla-manager-agent/gcs-service-account.json
        #GCS     subPath: gcs-service-account.json
        #GCS     readOnly: true
