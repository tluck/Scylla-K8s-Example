# change these params to configure the cluster and testing environment - these are used in the other scripts
context=$(kubectl config current-context || exit 1)

helmEnabled=false # use helm or kubectl
backupEnabled=true # enable/configure the cluster for backups with ScyllaDB Manager
minioEnabled=false # enable/deploy Minio for backups (vs AWS s3) - generally for docker desktop testing
if [[ ${context} == "docker-desktop" && ${backupEnabled} == true ]]; then
  minioEnabled=true #   enable/deploy Minio for backups (vs AWS s3)
fi

# for DDB/alternator
enableAlternator=true # true # enable alternator (DynamoDB API)
writeIsolation="only_rmw_uses_lwt" # "unsafe_rmw" "forbid_rmw" "always"  # alternator write isolation level

# use password auth when mTLS is not enabled - username/password: cassandra/cassandra
enableAuth=true # or false # enable password auth - builds a custom configMap
enableTLS=true # use TLS - must enableAuth - builds a custom configMap
# Note: if mTLS is enabled then, it uses custom certs for the client instead of the operator generated certs
mTLS=false # true # will enable mutual mTLS certificate auth instead of user-passwd auth. 
customCerts=false # true # this replaces the operator generated certs - needed for dual DC in 1 k8s cluster with TLS enabled
# Encryption at Rest (Enterprise): encrypt system + all user tables using a locally-generated key (no cloud KMS).
# The key is generated once into encryption_keys/system_key, stored as the ${clusterName}-encryption-key secret,
# and mounted into every Scylla pod. Requires enableAuth=true and helmEnabled=false (uses the custom configMap path).
# *** Back up encryption_keys/system_key -- losing it makes the encrypted data unrecoverable. ***
encryptionAtRest=false # true # local-key encryption at rest via LocalFileSystemKeyProviderFactory
developerMode=false # developer mode - disable the node tuning - generally for developer testing

# aws instance arch types - only used for cloud testing, ignored for docker desktop
arch="x86_64" # 
arch="aarch64"

# Override to allow non-standard RF and rack configurations (e.g. if you have less than 3 racks)
# rf_validate_rack_keyspaces="false"
# enforce_rack_list="false"

# versions
operatorRepository="scylladb"
operatorTag="1.21.0" # "1.20.2" # "1.19.1" # "1.18.1"
dbVersion="2026.2.1" # "2026.1.6" # "2025.4.10"
# with 2026.2+ - the default superuser is not there! so you can set it.
authSuperuserName="cassandra"
authSuperuserPassword="cassandra"
authSuperuserSaltedPassword='$6$XCUuMp2zO2RidWq7$TQYL1.w5Cl.wnrYJcFfGoN9E.wEwEjf2S.VcXnI4diQmk2Q2ZJ5G81pJ2Gum0QKErfx0J7D96bwPw2RCpBAj9/'
managerVersion="3.11.2" # "3.10.1"
agentVersion="3.11.2" # "3.10.1"
prometheusVersion="3.11.3" # "3.9.1" # "3.7.2"

# resource configs
clusterName="scylla" # name of the cluster - must but the same for multi-dc testing
dataCenterName="dc1" # use dc1 and dc2 for multi-dc testing
clusterNamespace="${clusterName}-${dataCenterName}"
scyllaMonitoringNamespace="scylla-monitoring"
scyllaManagerNamespace="scylla-manager"
# for multi-dc testing use with dual k8s clusters use IPs:
# externalSeeds=( 172.31.1.39 172.31.1.185 172.31.1.129 ) #("EXTERNAL-SEED-1" "EXTERNAL-SEED-2" "EXTERNAL-SEED-3") 
# for same k8s cluster multi-dc testing use service names:
clusterNamespaceDC1="scylla-dc1"
externalSeeds=("${clusterName}-dc1-rack1-0.${clusterNamespaceDC1}"\
               "${clusterName}-dc1-rack2-0.${clusterNamespaceDC1}"\
               "${clusterName}-dc1-rack3-0.${clusterNamespaceDC1}") # add external seed nodes here

# defaults for node service type and broadcast types
nodeServiceType="Headless"     # Headless, ClusterIP,        LoadBalancer
broadcastClientsType="PodIP"   # PodIP,    ServiceClusterIP, ServiceLoadBalancer
broadcastNodesType="PodIP"     # PodIP,    ServiceClusterIP, ServiceLoadBalancer

# # access all in a VPC
# nodeServiceType="ClusterIP"                # Headless, ClusterIP,        LoadBalancer
# broadcastClientsType="PodIP"               # PodIP,    ServiceClusterIP, ServiceLoadBalancer
# broadcastNodesType="ServiceClusterIP"      # PodIP,    ServiceClusterIP, ServiceLoadBalancer

# # multi-VPC
# nodeServiceType="Headless"                 # Headless, ClusterIP,        LoadBalancer
# broadcastClientsType="PodIP"               # PodIP,    ServiceClusterIP, ServiceLoadBalancer
# broadcastNodesType="PodIP"                 # PodIP,    ServiceClusterIP, ServiceLoadBalancer

# # internet
# nodeServiceType="LoadBalancer"                    # Headless, ClusterIP,        LoadBalancer
# broadcastClientsType="ServiceLoadBalancerIngress" # PodIP,    ServiceClusterIP, ServiceLoadBalancer
# broadcastNodesType="ServiceClusterIP"             # PodIP,    ServiceClusterIP, ServiceLoadBalancer

scrape_interval="30s"  # prometheus scrape interval

# general params for resource allocation
waitPeriod="600s" # how long to wait for the cluster to be ready

# use minio vs native object storage
  if [[ ${minioEnabled} == true ]]; then
    s3BucketName="scylla-backups"
  else
    # Buckets for ScyllaDB Manager Backups
    # in EKS s3 uses the SA for s3 access
    awsRegion="us-west-2"
    s3BucketName="scylla-backups-uswest2" 
    gcsBucketName="scylla-backups-gke"
  fi

if [[ ${context} == "docker-desktop" ]]; then
  singleZone=true # true # use a single zone for testing
  members=1 # n instance/node per rack
  # labels for a common nodepool - both are the same name if using a single nodepool in dev mode
  nodeSelector0="scylla"
  nodeSelector1="scylla"  
  nodeSelector2="scylla"  

  dbCapacity=1Gi
  dbCpuLimit=1
  dbMemoryLimit=2Gi

  managerCpuLimit=500m
  managerMemoryLimit=500Mi

  managerMembers=1
  managerDbCapacity=1Gi
  managerDbCpuLimit=500m
  managerDbMemoryLimit=1Gi

  monitoringCapacity=1Gi
else
  singleZone=false # use true if you need a single zone
  members=1 # n instance/node per rack
  awsRegion="us-west-2"
  gcpRegion="us-west1"
  [[ ${context} == *gke* ]] && gkeServiceAccount=$(gcloud iam service-accounts list --filter="displayName:gke-service-account" --format="value(email)")

  # labels for 2 nodepools - dedicated and non-dedicated
  nodeSelector0="scylla-operator" # nodes for everything except scylladb
  nodeSelector1="scylla"  # nodes dedicated to just scylladb
  nodeSelector2="application" # nodes for applications

  if [[ ${developerMode} == true ]]; then
    printf "Developer mode is enabled - using lower resource limits\n"
    dbCapacity=1Gi
    dbCpuLimit=1
    dbMemoryLimit=2Gi

    managerCpuLimit=500m
    managerMemoryLimit=500Mi

    managerMembers=1
    managerDbCapacity=1Gi
    managerDbCpuLimit=500m
    managerDbMemoryLimit=1Gi
  else
    dbCapacity=100Gi
    dbCpuLimit=6
    dbMemoryLimit=24Gi

    managerCpuLimit=2
    managerMemoryLimit=4Gi

    managerMembers=1 # 1 or 3
    managerDbCapacity=30Gi
    managerDbCpuLimit=2
    managerDbMemoryLimit=4Gi
  fi 

  monitoringCapacity=10Gi
fi
